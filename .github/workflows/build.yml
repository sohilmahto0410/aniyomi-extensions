name: Build 9anime Extension

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:   # lets you trigger manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build 9anime extension APK
        run: ./gradlew :src:en:nineanime:assembleRelease

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: 9anime-extension-apk
          path: src/en/nineanime/build/outputs/apk/release/*.apk
